<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manual Call — Agent</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px;
           margin: 40px auto; padding: 20px; background: #f0f4f8; }
    .card { background: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h2 { margin-bottom: 4px; }
    .badge { padding: 4px 10px; border-radius: 10px; font-size: 12px;
             font-weight: bold; }
    .connected { background: #dcfce7; color: #166534; }
    .waiting { background: #fef9c3; color: #854d0e; }
    #log { background: #f9f9f9; border-radius: 8px; padding: 12px;
           font-family: monospace; font-size: 12px; min-height: 120px;
           white-space: pre-wrap; margin: 16px 0; line-height: 1.6;
           max-height: 300px; overflow-y: auto; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px;
           font-size: 14px; cursor: pointer; margin-right: 8px; }
    .btn-end { background: #e53935; color: white; }
    .btn-mute { background: #f0f4f8; color: #333; border: 1px solid #ddd; }
    .status-row { margin-bottom: 16px; font-size: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h2>📞 Manual Call — Agent</h2>
  <div class="status-row">
    Status: <span class="badge waiting" id="statusBadge">
      Waiting for customer...
    </span>
  </div>

  <div id="log">Connecting to signaling server...</div>

  <button class="btn btn-mute" onclick="toggleMute()" id="muteBtn">
    🎤 Mute
  </button>
  <button class="btn btn-end" onclick="endCall()">📵 End Call</button>
</div>

<script>
  const params = new URL(window.location.href).searchParams;
  const roomId = params.get('room');
  const role = 'agent';

  let ws, pc, localStream;
  let isMuted = false;
  let pendingCandidates = [];

  const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  function log(msg) {
    const el = document.getElementById('log');
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  }

  async function init() {
    // Get mic
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          sampleRate: 48000,
          channelCount: 1
        }
      });
      log('Microphone ready');
    } catch(e) {
      log('ERROR: Microphone access denied');
      return;
    }

    // Connect signaling — use same host as page
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsHost = window.location.host;
    ws = new WebSocket(`${wsProtocol}//${wsHost}/webrtc-signal?room=${roomId}&role=${role}`);

    ws.onopen = () => log('Connected to server. Waiting for customer to join...');
    ws.onerror = (e) => log('Signaling error: ' + e.message);
    ws.onclose = () => log('Signaling disconnected');

    ws.onmessage = async ({ data }) => {
      const msg = JSON.parse(data);
      log('Received: ' + msg.type);

      if (msg.type === 'peer-joined') {
        log('Customer joined! Creating offer...');
        await setupPeerConnection();
        await createOffer();
      }

      if (msg.type === 'answer') {
        await pc.setRemoteDescription(
          new RTCSessionDescription(msg.answer)
        );
        log('Answer received — flushing ICE candidates');
        await flushCandidates();
      }

      if (msg.type === 'ice-candidate') {
        await addCandidate(msg.candidate);
      }
    };
  }

  async function setupPeerConnection() {
    pc = new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.ontrack = ({ streams }) => {
      log('Customer audio connected!');
      const audio = new Audio();
      audio.srcObject = streams[0];
      audio.play();
    };

    pc.onicecandidate = ({ candidate }) => {
      if (candidate) {
        ws.send(JSON.stringify({ type: 'ice-candidate', candidate }));
      }
    };

    pc.onconnectionstatechange = () => {
      log('Connection state: ' + pc.connectionState);
      if (pc.connectionState === 'connected') {
        document.getElementById('statusBadge').textContent = 'Connected ✓';
        document.getElementById('statusBadge').className = 'badge connected';
        startSilentRecording();
      }
      if (pc.connectionState === 'failed') {
        log('Connection failed — try refreshing both pages');
      }
    };
  }

  async function createOffer() {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', offer }));
    log('Offer sent to customer');
  }

  async function addCandidate(candidate) {
    try {
      if (pc?.remoteDescription?.type) {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } else {
        pendingCandidates.push(candidate);
      }
    } catch(e) {
      log('ICE error: ' + e.message);
    }
  }

  async function flushCandidates() {
    log('Flushing ' + pendingCandidates.length + ' queued candidates');
    for (const c of pendingCandidates) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(c));
      } catch(e) {}
    }
    pendingCandidates = [];
  }

  // Silent recording — sends transcript chunks
  function startSilentRecording() {
    log('Starting silent recording for transcript...');

    let mimeType = '';
    const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', ''];
    for (const t of types) {
      if (t === '' || MediaRecorder.isTypeSupported(t)) {
        mimeType = t; break;
      }
    }

    function recordChunk() {
      if (pc?.connectionState !== 'connected') return;

      const recorder = mimeType
        ? new MediaRecorder(localStream, { mimeType })
        : new MediaRecorder(localStream);

      let chunks = [];
      recorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      recorder.onstop = async () => {
        if (chunks.length === 0) { recordChunk(); return; }

        const blob = new Blob(chunks, { type: 'audio/webm' });
        const formData = new FormData();
        formData.append('audio', blob, 'audio.webm');

        try {
          const res = await fetch('/transcribe-manual', {
            method: 'POST', body: formData
          });
          const data = await res.json();
          if (data.transcript?.trim()) {
            log('[You]: ' + data.transcript);
            ws.send(JSON.stringify({
              type: 'transcript-chunk',
              role: 'agent',
              text: data.transcript
            }));
          }
        } catch(e) {}

        // Keep recording
        if (pc?.connectionState === 'connected') recordChunk();
      };

      recorder.start();
      setTimeout(() => {
        if (recorder.state === 'recording') recorder.stop();
      }, 5000);
    }

    recordChunk();
  }

  function toggleMute() {
    isMuted = !isMuted;
    localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
    document.getElementById('muteBtn').textContent =
      isMuted ? '🔇 Unmute' : '🎤 Mute';
  }

  function endCall() {
    pc?.close();
    ws?.close();
    localStream?.getTracks().forEach(t => t.stop());
    log('Call ended.');
    document.getElementById('statusBadge').textContent = 'Ended';
    document.getElementById('statusBadge').className = 'badge';
  }

  init();
</script>
</body>
</html>
